name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Validate release versions
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"
          cargo_version="$(node -e "const fs=require('fs'); const text=fs.readFileSync('src-tauri/Cargo.toml','utf8'); const match=text.match(/^version\\s*=\\s*\"([^\"]+)\"/m); if(!match){throw new Error('Unable to read version from src-tauri/Cargo.toml')} process.stdout.write(match[1])")"

          echo "Release version map:"
          echo "  tag: ${tag_version}"
          echo "  package.json: ${package_version}"
          echo "  tauri.conf.json: ${tauri_version}"
          echo "  Cargo.toml: ${cargo_version}"

          if [[ "${tag_version}" != "${package_version}" || "${tag_version}" != "${tauri_version}" || "${tag_version}" != "${cargo_version}" ]]; then
            echo "Release version mismatch. Sync the tag, package.json, src-tauri/tauri.conf.json, and src-tauri/Cargo.toml before publishing." >&2
            exit 1
          fi

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Generate updater bundle config
        working-directory: .
        run: node scripts/build-tauri-release-config.mjs
        env:
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}

      - name: Validate updater signing keys
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" || -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" || -z "${TAURI_PUBLIC_KEY:-}" ]]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD, or TAURI_PUBLIC_KEY repository secret." >&2
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Build Tauri App
        working-directory: .
        run: npm run tauri build -- --config tmp/tauri.release.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}

      - name: Rename exe file
        run: |
          mv src-tauri/target/release/JX3RaidManager.exe src-tauri/target/release/JX3RaidManager_${{ github.ref_name }}.exe || true

      - name: Build updater manifest
        working-directory: .
        run: node scripts/build-updater-manifest.mjs ${{ github.ref_name }}

      - name: Build gitee updater manifest
        working-directory: .
        run: node scripts/build-updater-manifest.mjs ${{ github.ref_name }} gitee tmp/gitee-updater/latest.json
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_ASSETS_BRANCH: ${{ secrets.GITEE_ASSETS_BRANCH }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            src-tauri/target/release/JX3RaidManager_${{ github.ref_name }}.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/latest*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes
        shell: bash
        run: |
          set -euo pipefail

          notes_file="release-notes/${GITHUB_REF_NAME}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "Missing release notes file: ${notes_file}" >&2
            exit 1
          fi

          npm run release:notes -- "${GITHUB_REF_NAME}" "${notes_file}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror code to Gitee
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GITEE_PUSH_URL:-}" ]]; then
            echo "Missing GITEE_PUSH_URL repository secret." >&2
            exit 1
          fi

          git remote remove gitee 2>/dev/null || true
          git remote add gitee "${GITEE_PUSH_URL}"
          git fetch origin master --tags
          git push gitee refs/remotes/origin/master:refs/heads/master --force
          git push gitee --tags --force
        env:
          GITEE_PUSH_URL: ${{ secrets.GITEE_PUSH_URL }}

      - name: Sync updater assets to Gitee
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GITEE_PUSH_URL:-}" ]]; then
            echo "Missing GITEE_PUSH_URL repository secret." >&2
            exit 1
          fi

          branch="${GITEE_ASSETS_BRANCH:-updater-assets}"
          rm -rf tmp/gitee-sync
          git clone --depth=1 --branch "$branch" "${GITEE_PUSH_URL}" tmp/gitee-sync 2>/dev/null || (
            git clone --depth=1 "${GITEE_PUSH_URL}" tmp/gitee-sync
            cd tmp/gitee-sync
            git checkout --orphan "$branch"
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          )

          mkdir -p tmp/gitee-sync/updater
          cp tmp/gitee-updater/latest.json "tmp/gitee-sync/updater/latest.json"
          cp "src-tauri/target/release/bundle/nsis/JX3RaidManager_${GITHUB_REF_NAME#v}_x64-setup.exe" "tmp/gitee-sync/updater/"
          cp "src-tauri/target/release/bundle/nsis/JX3RaidManager_${GITHUB_REF_NAME#v}_x64-setup.exe.sig" "tmp/gitee-sync/updater/"

          cd tmp/gitee-sync
          git checkout "$branch" 2>/dev/null || git checkout -b "$branch"
          git add updater/latest.json "updater/JX3RaidManager_${GITHUB_REF_NAME#v}_x64-setup.exe" "updater/JX3RaidManager_${GITHUB_REF_NAME#v}_x64-setup.exe.sig"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "release: 同步 ${GITHUB_REF_NAME} 更新资产" || echo "No updater asset changes to commit"
          git push origin "$branch"
        env:
          GITEE_PUSH_URL: ${{ secrets.GITEE_PUSH_URL }}
          GITEE_ASSETS_BRANCH: ${{ secrets.GITEE_ASSETS_BRANCH }}

      - name: Update asset labels
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "${GITHUB_REF_NAME}" \
            "src-tauri/target/release/bundle/nsis/JX3RaidManager_${GITHUB_REF_NAME#v}_x64-setup.exe.sig#自动更新签名文件" \
            --clobber

          gh release upload "${GITHUB_REF_NAME}" \
            "src-tauri/target/release/bundle/latest.json#自动更新元数据" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
